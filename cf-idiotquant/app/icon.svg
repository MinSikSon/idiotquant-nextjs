<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- rounded square background -->
  <rect width="32" height="32" rx="7" fill="#16a34a"/>
  <!-- subtle inner shade for depth -->
  <rect width="32" height="32" rx="7" fill="url(#g)" opacity="0.15"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
  </defs>
  <!-- upward bar chart: 3 bars -->
  <rect x="5"  y="20" width="5" height="7" rx="1.5" fill="#fff" opacity="0.6"/>
  <rect x="13" y="14" width="5" height="13" rx="1.5" fill="#fff" opacity="0.8"/>
  <rect x="21" y="8"  width="5" height="19" rx="1.5" fill="#fff"/>
  <!-- rising trend dot -->
  <circle cx="23.5" cy="6.5" r="2" fill="#bbf7d0"/>
</svg>
