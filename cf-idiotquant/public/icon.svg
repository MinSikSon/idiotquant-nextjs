<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <clipPath id="pentClip">
      <polygon points="32,3 61,24 50,57 14,57 3,24"/>
    </clipPath>
  </defs>
  <!-- Pentagon filled -->
  <polygon points="32,3 61,24 50,57 14,57 3,24" fill="url(#pent)"/>
  <!-- Candlestick chart inside, clipped to pentagon -->
  <g clip-path="url(#pentClip)">
    <!-- Candle 1 (down, red) -->
    <line x1="16" y1="22" x2="16" y2="44" stroke="#bbf7d0" stroke-width="1" opacity="0.6"/>
    <rect x="13" y="26" width="6" height="10" rx="1" fill="#4ade80" opacity="0.8"/>
    <!-- Candle 2 (up, green) -->
    <line x1="25" y1="18" x2="25" y2="42" stroke="#bbf7d0" stroke-width="1" opacity="0.6"/>
    <rect x="22" y="20" width="6" height="16" rx="1" fill="#ffffff" opacity="0.9"/>
    <!-- Candle 3 (down) -->
    <line x1="34" y1="20" x2="34" y2="40" stroke="#bbf7d0" stroke-width="1" opacity="0.6"/>
    <rect x="31" y="24" width="6" height="12" rx="1" fill="#4ade80" opacity="0.75"/>
    <!-- Candle 4 (up, tall) -->
    <line x1="43" y1="15" x2="43" y2="44" stroke="#bbf7d0" stroke-width="1" opacity="0.6"/>
    <rect x="40" y="17" width="6" height="20" rx="1" fill="#ffffff"/>
  </g>
</svg>
