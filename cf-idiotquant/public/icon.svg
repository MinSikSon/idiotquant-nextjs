<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="32,4 57,18.5 57,45.5 32,60 7,45.5 7,18.5" fill="url(#bg)"/>

  <!-- Geometric "I" -->
  <rect x="16" y="22" width="11" height="3" rx="1" fill="white"/>
  <rect x="20" y="25" width="3" height="14" fill="white"/>
  <rect x="16" y="39" width="11" height="3" rx="1" fill="white"/>

  <!-- Geometric "Q": ring + diagonal tail -->
  <circle cx="42" cy="31" r="10" fill="none" stroke="white" stroke-width="3.5"/>
  <line x1="49" y1="38" x2="55" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
