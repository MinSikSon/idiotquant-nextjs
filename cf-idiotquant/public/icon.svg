<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Outer triangle filled -->
  <polygon points="32,6 58,52 6,52" fill="url(#tri)"/>
  <!-- Geometric subdivision: inner triangles -->
  <!-- Top inverted small triangle (white) -->
  <polygon points="32,29 19,52 45,52" fill="#ffffff" opacity="0.92"/>
  <!-- Left lower triangle (light green) -->
  <polygon points="19,52 32,29 19,29" fill="#bbf7d0" opacity="0.7"/>
  <!-- Right small accent triangle -->
  <polygon points="45,52 32,29 45,29" fill="#bbf7d0" opacity="0.5"/>
</svg>
